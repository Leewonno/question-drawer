<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="질문서랍 Question Drawer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f1b12"/>
      <stop offset="0.55" stop-color="#12251a"/>
      <stop offset="1" stop-color="#0c1710"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7BE27B"/>
      <stop offset="1" stop-color="#43C55A"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c3325"/>
      <stop offset="1" stop-color="#16291d"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <radialGradient id="glow" cx="0.8" cy="0.2" r="0.9">
      <stop offset="0" stop-color="#43C55A" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#43C55A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="400" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="400" rx="24" fill="url(#glow)"/>

  <!-- subtle dotted grid -->
  <g fill="#43C55A" opacity="0.06">
    <circle cx="60" cy="60" r="2.4"/><circle cx="120" cy="60" r="2.4"/><circle cx="180" cy="60" r="2.4"/>
    <circle cx="60" cy="120" r="2.4"/><circle cx="120" cy="120" r="2.4"/><circle cx="180" cy="120" r="2.4"/>
    <circle cx="60" cy="180" r="2.4"/><circle cx="120" cy="180" r="2.4"/>
  </g>

  <!-- left: text -->
  <g transform="translate(80, 132)">
    <!-- puzzle mark -->
    <g transform="translate(0,-58)">
      <rect x="0" y="0" width="46" height="46" rx="10" fill="url(#accent)"/>
      <circle cx="23" cy="6" r="7" fill="url(#accent)"/>
      <circle cx="40" cy="23" r="7" fill="url(#accent)"/>
      <rect x="14" y="14" width="18" height="18" rx="4" fill="#12251a"/>
    </g>
    <text x="0" y="52" font-family="'Pretendard','Apple SD Gothic Neo','Segoe UI',sans-serif" font-size="76" font-weight="800" fill="#F2FBF3" letter-spacing="-1">질문서랍</text>
    <text x="4" y="96" font-family="'SF Mono','JetBrains Mono',monospace" font-size="26" font-weight="600" fill="#7BE27B" letter-spacing="4">QUESTION&#160;DRAWER</text>
    <text x="4" y="140" font-family="'Pretendard','Apple SD Gothic Neo','Segoe UI',sans-serif" font-size="22" font-weight="500" fill="#A9C8B2">궁금한 부분을 드래그해 담아두고,</text>
    <text x="4" y="170" font-family="'Pretendard','Apple SD Gothic Neo','Segoe UI',sans-serif" font-size="22" font-weight="500" fill="#A9C8B2">클릭 한 번으로 후속 질문을 꽂아주는 확장</text>
  </g>

  <!-- right: drawer illustration -->
  <g transform="translate(720, 44)" filter="url(#soft)">
    <!-- drawer panel -->
    <rect x="0" y="0" width="400" height="312" rx="20" fill="#0e1c13" stroke="#2c4a35" stroke-width="1.5"/>
    <!-- drawer handle tab -->
    <rect x="-14" y="118" width="14" height="76" rx="6" fill="url(#accent)"/>

    <!-- header -->
    <g transform="translate(24,24)">
      <rect x="0" y="0" width="30" height="30" rx="8" fill="url(#accent)"/>
      <rect x="8" y="9" width="14" height="3" rx="1.5" fill="#0e1c13"/>
      <rect x="8" y="15" width="14" height="3" rx="1.5" fill="#0e1c13"/>
      <rect x="8" y="21" width="9" height="3" rx="1.5" fill="#0e1c13"/>
      <text x="42" y="21" font-family="'Pretendard','Segoe UI',sans-serif" font-size="17" font-weight="700" fill="#EAF6EC">서랍</text>
    </g>
    <line x1="24" y1="70" x2="376" y2="70" stroke="#2c4a35" stroke-width="1"/>

    <!-- question cards -->
    <g transform="translate(24,86)">
      <rect x="0" y="0" width="352" height="52" rx="12" fill="url(#card)" stroke="#2c4a35" stroke-width="1"/>
      <circle cx="20" cy="26" r="4" fill="#7BE27B"/>
      <rect x="36" y="16" width="150" height="7" rx="3.5" fill="#CDE6D3"/>
      <rect x="36" y="30" width="230" height="6" rx="3" fill="#5f8069"/>
    </g>
    <g transform="translate(24,148)">
      <rect x="0" y="0" width="352" height="52" rx="12" fill="url(#card)" stroke="#2c4a35" stroke-width="1"/>
      <circle cx="20" cy="26" r="4" fill="#7BE27B"/>
      <rect x="36" y="16" width="120" height="7" rx="3.5" fill="#CDE6D3"/>
      <rect x="36" y="30" width="200" height="6" rx="3" fill="#5f8069"/>
    </g>

    <!-- highlighted selection card + capture button (newest at bottom) -->
    <g transform="translate(24,210)">
      <rect x="0" y="0" width="352" height="52" rx="12" fill="#1e4a2c" stroke="#43C55A" stroke-width="1.5"/>
      <rect x="36" y="16" width="96" height="14" rx="4" fill="#43C55A" opacity="0.35"/>
      <rect x="36" y="18" width="96" height="10" rx="3" fill="#7BE27B"/>
      <rect x="36" y="34" width="150" height="5" rx="2.5" fill="#6fae7f"/>
      <!-- + capture chip -->
      <g transform="translate(250,13)">
        <rect x="0" y="0" width="86" height="26" rx="13" fill="url(#accent)"/>
        <path d="M15 13 h10 M20 8 v10" stroke="#0e1c13" stroke-width="2.4" stroke-linecap="round"/>
        <text x="34" y="17" font-family="'Pretendard','Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#0e1c13">담기</text>
      </g>
    </g>
  </g>
</svg>
